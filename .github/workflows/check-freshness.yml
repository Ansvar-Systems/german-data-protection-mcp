name: Check Data Freshness

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  check-freshness:
    name: Check BfDI/DSK data freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check freshness via MCP tool
        id: freshness
        run: |
          node -e "
          import('./dist/src/db.js').then(({ getDataAge, getRecordCounts }) => {
            const age = getDataAge();
            const counts = getRecordCounts();
            const ageDays = Math.floor((Date.now() - new Date(age).getTime()) / 86400000);
            console.log('Last data date:', age);
            console.log('Age (days):', ageDays);
            console.log('Decisions:', counts.decisions);
            console.log('Guidelines:', counts.guidelines);
            console.log('Topics:', counts.topics);
            if (ageDays > 30) {
              console.log('STATUS: STALE');
              process.exitCode = 1;
            } else {
              console.log('STATUS: FRESH');
            }
          }).catch(err => {
            console.error('Error:', err.message);
            process.exit(1);
          });
          " 2>&1 | tee freshness-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload freshness report
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: freshness-report.txt
          retention-days: 30

      - name: Open issue if stale
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('freshness-report.txt', 'utf8');
            const title = 'Data freshness alert: corpus may be stale';
            const body = [
              '## Data Freshness Alert',
              '',
              'The BfDI/DSK data corpus has not been updated in over 30 days.',
              '',
              '**Freshness report:**',
              '```',
              report,
              '```',
              '',
              'Run the ingest workflow or trigger `npm run ingest` to refresh the data.',
              '',
              '_This issue was opened automatically by the check-freshness workflow._',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-freshness',
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['data-freshness'],
              });
            }
