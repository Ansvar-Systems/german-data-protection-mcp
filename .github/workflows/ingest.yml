name: Ingest BfDI/DSK Data

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be ingested, do not write)"
        required: false
        default: "false"
        type: boolean

jobs:
  ingest:
    name: Ingest BfDI and DSK publications
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest script
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run mode — skipping write"
            npx tsx scripts/ingest-bfdi.ts --dry-run
          else
            npx tsx scripts/ingest-bfdi.ts
          fi

      - name: Show record counts
        if: success()
        run: |
          node -e "
          import('./dist/src/db.js').then(({ getDataAge, getRecordCounts }) => {
            const age = getDataAge();
            const counts = getRecordCounts();
            console.log('Ingestion complete');
            console.log('Last data date:', age);
            console.log('Decisions:', counts.decisions);
            console.log('Guidelines:', counts.guidelines);
            console.log('Topics:', counts.topics);
          }).catch(() => {
            console.log('Note: could not query DB (may need npm run build first)');
          });
          " || true

      - name: Commit updated database
        if: success() && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update BfDI/DSK corpus $(date -u +%Y-%m-%d)"
            git push
          fi
